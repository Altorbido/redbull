<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Bull x Modern Academy Collab</title>
<style>
    /* --- PAGE STYLING & THE MAGICAL DIAGONAL CUT --- */
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        height: 100vh;
        overflow: hidden; 
        
        /* 
           75deg flips the direction (Top-Left to Down-Right).
           #e8e8e8 is the first color (Left Side).
           #001D4B is the last color (Right Side).
        */
        background: linear-gradient(
            75deg, 
            #e8e8e8 calc(50% - 3px),   
            #DA1A32 calc(50% - 3px),   
            #DA1A32 calc(50% + 3px),   
            #001D4B calc(50% + 3px)    
        );
    }

    /* --- LAYOUT: LEFT AND RIGHT HALVES --- */
    .page-wrapper {
        display: flex;
        width: 100%;
        height: 100%;
    }

    .half-screen {
        flex: 1; 
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px; 
        z-index: 10;
    }

    /* --- COLLAB LOGOS (RIGHT SIDE) --- */
    .collab-container {
        display: flex;
        align-items: center;
        gap: 45px; 
    }

    .collab-line {
        width: 2px;
        height: 120px; 
        background-color: #ffffff; 
        border-radius: 2px;
        opacity: 0.9; 
        margin-left: 50px;
    }

    .modern-logo {
        width: 280px; 
        object-fit: contain; 
        filter: drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.3));
        margin-left: 70px;
    }

    .redbull-logo {
        width: 350px; 
        object-fit: contain; 
    }

    /* --- INPUT BOX CSS (LEFT SIDE) --- */
    .brutalist-container {
      position: relative;
      width: 360px; 
      font-family: monospace;
    }

    .brutalist-input {
      width: 100%;
      padding: 20px; 
      font-size: 22px; 
      font-weight: bold;
      color: #001D4B; 
      background-color: #fff;
      border: 4px solid #000; 
      position: relative;
      overflow: hidden;
      border-radius: 0;
      outline: none;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 
        5px 5px 0 #001D4B,   
        10px 10px 0 #DA1A32, 
        15px 15px 0 #FFCB05; 
      box-sizing: border-box;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }

    .brutalist-input:focus {
      animation: rb-focus-pulse 4s cubic-bezier(0.25, 0.8, 0.25, 1) infinite,
        glitch 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) infinite;
    }

    .brutalist-input:focus::after {
      content: "";
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: white;
      z-index: -1;
    }

    .brutalist-input:focus::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #001D4B;
      z-index: -2;
      clip-path: inset(0 100% 0 0);
      animation: glitch-slice 4s steps(2, end) infinite;
    }

    @keyframes glitch-slice {
      0% { clip-path: inset(0 100% 0 0); }
      10% { clip-path: inset(0 5% 0 0); }
      20% { clip-path: inset(0 80% 0 0); }
      30% { clip-path: inset(0 10% 0 0); }
      40% { clip-path: inset(0 50% 0 0); }
      50% { clip-path: inset(0 30% 0 0); }
      60% { clip-path: inset(0 70% 0 0); }
      70% { clip-path: inset(0 15% 0 0); }
      80% { clip-path: inset(0 90% 0 0); }
      90% { clip-path: inset(0 5% 0 0); }
      100% { clip-path: inset(0 100% 0 0); }
    }

    /* --- LABEL STYLING --- */
    .brutalist-label {
      position: absolute;
      left: -3px;
      top: -38px; 
      font-size: 16px; 
      font-weight: bold;
      color: #fff;
      background-color: #000;
      padding: 5px 10px;
      transform: rotate(-1deg);
      z-index: 1;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      cursor: default; 
    }

    .brutalist-label:hover {
      color: #FFCB05; 
    }

    .brutalist-input:focus + .brutalist-label {
      transform: rotate(0deg) scale(1.05);
      background-color: #DA1A32; 
      color: #fff;
    }

    .smooth-type {
      position: relative;
      overflow: hidden;
    }

    .smooth-type::before {
      content: "";
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      background: linear-gradient(90deg, #fff 0%, rgba(255, 255, 255, 0) 100%);
      z-index: 1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .smooth-type:focus::before {
      opacity: 1;
      animation: type-gradient 2s linear infinite;
    }

    @keyframes type-gradient {
      0% { background-position: 300px 0; }
      100% { background-position: 0 0; }
    }

    .brutalist-input::placeholder {
      color: #888;
      transition: color 0.3s ease;
    }

    .brutalist-input:focus::placeholder {
      color: transparent;
    }

    @keyframes rb-focus-pulse {
      0%, 100% { border-color: #000; }
      50% { border-color: #001D4B; }
    }

    /* --- SIGN UP BUTTON --- */
    .sign-up {
      border: 4px solid #000; 
      background: #001D4B;    
      color: #ffffff;         
      padding: 18px;          
      font-size: 22px;        
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease; 
      width: 100%;
      margin-top: 35px;       
      box-sizing: border-box;
    }

    .sign-up:hover {
      background: #001D4B;    
      color: #ffffff;         
      border-color: #000;     
      transform: translateY(-5px); 
      box-shadow: 0 5px 0 #000;    
    }

    .sign-up:active {
      animation: shake 0.5s ease-in-out;
      transform: translateY(0);
      box-shadow: none;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }
    /* This only triggers when the screen is narrower than 768 pixels */
    @media (max-width: 768px) {
        body {
            /* Changes the diagonal to a horizontal split for phones */
            background: linear-gradient(
                180deg, 
                #e8e8e8 50%, 
                #DA1A32 50%, 
                #DA1A32 calc(50% + 5px), 
                #001D4B calc(50% + 5px)
            );
            overflow-y: auto; /* Allows scrolling if content is too tall */
        }

        .page-wrapper {
            flex-direction: column; /* Stacks the halves on top of each other */
        }

        .half-screen {
            padding: 20px;
            height: 50vh; /* Each side takes half the height of the phone */
        }

        .modern-logo { width: 180px; }
        .redbull-logo { width: 220px; }
        .brutalist-container { width: 90%; }
        .collab-line { height: 60px; }
    }
</style>
</head>
<body>

    <div class="page-wrapper">

        <!-- LEFT SIDE: The Input Box Area (On Grey) -->
        <div class="half-screen left-side">
            <div class="brutalist-container">
              <input placeholder="TYPE HERE" class="brutalist-input smooth-type" type="text" />
              <label class="brutalist-label">ENTER YOUR STUDENT CODE</label>
              <button class="sign-up">CHECK CODE</button>
            </div>
        </div>

        <!-- RIGHT SIDE: The Collab Logos Area (On Blue) -->
        <div class="half-screen right-side">
            <div class="collab-container">
                <img src="modern.png" alt="Modern Academy Logo" class="modern-logo">
                
                <div class="collab-line"></div>
                
                <img src="bull.png" alt="Red Bull Logo" class="redbull-logo">
            </div>
        </div>

    </div>

</body>
</html>
